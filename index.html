<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annu Siby - Web Developer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>

  <div class="portfolio-wrap">
    <div class="card">
      <div class="card-accent"></div>

      <div class="avatar-ring">
        <img src="profile.jpg" alt="Annu Siby" class="avatar-img">
      </div>

      <h1 class="name">Annu Siby</h1>

      <div class="role-badge">
        <i class="ti ti-code"></i>
        Web Developer
      </div>

      <div>
        <span class="open-to-work">
          <span class="status-dot"></span>
          Open to opportunities
        </span>
      </div>

      <p class="bio">CS graduate passionate about building responsive, user-centric web experiences. Always learning, always building.</p>

      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-num">9</span>
          <span class="stat-lbl">Skills</span>
        </div>
        <div class="stat-box">
          <span class="stat-num">CS</span>
          <span class="stat-lbl">Graduate</span>
        </div>
        <div class="stat-box">
          <span class="stat-num">&#8734;</span>
          <span class="stat-lbl">Curiosity</span>
        </div>
      </div>

      <p class="section-label">Tech stack</p>
      <div class="skills-grid">
        <span class="skill-pill pill-blue"><i class="ti ti-brand-python"></i>Python</span>
        <span class="skill-pill pill-purple"><i class="ti ti-database"></i>SQL</span>
        <span class="skill-pill pill-green"><i class="ti ti-leaf"></i>MongoDB</span>
        <span class="skill-pill pill-teal"><i class="ti ti-server"></i>Flask</span>
        <span class="skill-pill pill-blue"><i class="ti ti-brand-html5"></i>HTML</span>
        <span class="skill-pill pill-purple"><i class="ti ti-brush"></i>CSS</span>
        <span class="skill-pill pill-teal"><i class="ti ti-brand-javascript"></i>JavaScript</span>
        <span class="skill-pill pill-green"><i class="ti ti-git-branch"></i>Git</span>
        <span class="skill-pill pill-blue"><i class="ti ti-brand-github"></i>GitHub</span>
      </div>

      <div class="divider"></div>

      <div class="social-row">
        <a class="social-btn" href="https://github.com/annusiby5" target="_blank">
          <i class="ti ti-brand-github"></i>
          GitHub
        </a>
        <a class="social-btn" href="https://www.linkedin.com/in/annu-siby" target="_blank">
          <i class="ti ti-brand-linkedin"></i>
          LinkedIn
        </a>
      </div>

    </div>
  </div>

</body>
</html>
